<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <!-- 使用相对路径引用本地 JS 和 CSS 文件 -->
    <script src="marked.min.js"></script>
    <link rel="stylesheet" href="github.min.css">
    <script src="highlight.min.js"></script>

<style>
    /* 全局页面样式 */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        padding: 30px;
        line-height: 1.6;
        color: #24292e;
        max-width: 900px;
        margin: 0 auto;
    }

    /* 代码块容器样式 - 解决 bash/text 辨认问题的核心 */
    pre {
        background-color: #f6f8fa; /* 浅灰色背景，类似 GitHub */
        border: 1px solid #e1e4e8;  /* 细边框 */
        border-radius: 6px;        /* 圆角 */
        padding: 16px;
        overflow: auto;            /* 溢出时显示滚动条 */
        margin-top: 0;
        margin-bottom: 16px;
    }

    /* 代码块内的文字样式 */
    pre code {
        background-color: transparent; /* 去掉代码块内 code 的背景 */
        padding: 0;
        border: none;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 85%;
        line-height: 1.45;
        color: #24292e; /* 确保 plain text 也能看清 */
    }
</style>
</head>
<body>
    <div id="content"></div>
    <script>
    function renderMarkdown(mdText) {
        const frontMatterRegex = /^---\s*([\s\S]*?)\s*---\s*/;
        const match = mdText.match(frontMatterRegex);

        let cleanMarkdown = mdText;
        let metadata = {};

        if (match) {
            // 提取 YAML 字符串内容
            const yamlString = match[1];
            cleanMarkdown = mdText.replace(match[0], '');

            // 简单的手动解析（针对 key: value 格式）
            yamlString.split('\n').forEach(line => {
                const [key, ...val] = line.split(':');
                if (key && val) metadata[key.trim()] = val.join(':').trim();
            });
        }

        // 在内容顶部插入一个自定义的标题（如果元数据里有的话）
        let headerHtml = "";
        if (metadata.title) {
            headerHtml = `<h1 style="border-bottom: 2px solid #eee; padding-bottom: 10px;">${metadata.title}</h1>`;
        }

        document.getElementById('content').innerHTML = headerHtml + marked.parse(cleanMarkdown);
        hljs.highlightAll();
    }
    </script>
</body>
</html>
